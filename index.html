<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="からだ記録">
<title>からだ記録</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #fff; font-family: -apple-system, 'Hiragino Sans', sans-serif; }
body { max-width: 430px; margin: 0 auto; }

/* ステータスバー余白（iPhone対応） */
.status-bar {
  background: #F7C1C1;
  padding: env(safe-area-inset-top, 12px) 16px 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.status-bar .title { font-size: 16px; font-weight: 600; color: #501313; }
.nav-btn {
  background: rgba(255,255,255,0.55); border: none; border-radius: 8px;
  padding: 4px 10px; font-size: 13px; color: #791F1F; cursor: pointer;
  font-family: inherit;
}

.cal-header {
  background: #FCEBEB; padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.month-label { font-size: 16px; font-weight: 600; color: #222; }
.month-nav { display: flex; gap: 4px; }
.month-nav button {
  background: none; border: none; color: #666; font-size: 20px;
  cursor: pointer; padding: 2px 8px; border-radius: 6px; font-family: inherit;
}

.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); padding: 4px 8px 0; border-bottom: 1px solid #F0EDE8; }
.weekday { text-align: center; font-size: 11px; color: #aaa; padding: 4px 0; }
.weekday:first-child { color: #E24B4A; }
.weekday:last-child  { color: #378ADD; }

.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 4px 8px 8px; gap: 3px; }
.day-cell {
  display: flex; flex-direction: column; align-items: center;
  padding: 3px 0; cursor: pointer; border-radius: 10px;
  min-height: 52px; position: relative; transition: background 0.1s;
}
.day-cell:active { background: #F0EDE8; }
.day-cell.has-blood { background: rgba(226,75,74,0.15); }
.day-num {
  font-size: 14px; color: #222; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-top: 4px; flex-shrink: 0;
}
.day-cell.other-month .day-num { color: #ccc; }
.day-cell.sun .day-num { color: #E24B4A; }
.day-cell.sat .day-num { color: #378ADD; }
.day-cell.has-blood .day-num { color: #A32D2D; font-weight: 600; }
.day-cell.today .day-num { background: #E24B4A; color: white !important; font-weight: 600; }

.icon-row { display: flex; gap: 2px; margin-top: 3px; align-items: center; justify-content: center; min-height: 12px; flex-wrap: wrap; }

.legend {
  display: flex; gap: 10px; padding: 8px 16px;
  border-top: 1px solid #F0EDE8; border-bottom: 1px solid #F0EDE8;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; }
.legend-swatch { width: 13px; height: 13px; border-radius: 3px; }

.memo-section { padding: 12px 16px 32px; }
.memo-section-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 8px; }
.memo-entry { display: flex; gap: 8px; align-items: flex-start; padding: 7px 0; border-top: 1px solid #F0EDE8; }
.memo-date { font-size: 11px; color: #aaa; white-space: nowrap; padding-top: 1px; min-width: 72px; }
.memo-body { font-size: 12px; color: #333; line-height: 1.6; }
.memo-type-tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-right: 3px; font-weight: 600; }
.tag-blood    { background: #FCEBEB; color: #791F1F; }
.tag-pill     { background: #E6F1FB; color: #0C447C; }
.tag-hospital { background: #EAF3DE; color: #27500A; }
.tag-pause    { background: #EEEDFE; color: #3C3489; }
.no-memo { font-size: 13px; color: #bbb; text-align: center; padding: 12px 0; }

/* モーダル */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end; justify-content: center; z-index: 100;
}
.modal-overlay.hidden { display: none; }
.modal {
  width: 100%; max-width: 430px;
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 24px 20px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom, 16px));
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #222; }
.btn-group   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
.btn-group-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.btn-record {
  padding: 16px 4px 12px; border-radius: 16px; border: 2px solid #E0E0E0;
  background: #F7F5F0; font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  transition: background 0.15s, border-color 0.15s;
  user-select: none; font-family: inherit;
}
.btn-record:active:not(.on-blood):not(.on-pill):not(.on-hospital):not(.on-pause) { background: #EDECE8; }
.btn-record.on-blood    { background: #FDF0EF !important; border-color: #E24B4A; }
.btn-record.on-pill     { background: #EEF4FB !important; border-color: #185FA5; }
.btn-record.on-hospital { background: #EDF5E8 !important; border-color: #3B6D11; }
.btn-record.on-pause    { background: #EEEDFE !important; border-color: #7F77DD; }
.btn-blood-label    { color: #E24B4A; font-size: 13px; font-weight: 600; }
.btn-pill-label     { color: #185FA5; font-size: 13px; font-weight: 600; }
.btn-hospital-label { color: #3B6D11; font-size: 13px; font-weight: 600; }
.btn-pause-label    { color: #534AB7; font-size: 13px; font-weight: 600; }

.memo-label { font-size: 13px; color: #666; margin-bottom: 6px; }
.memo-input {
  width: 100%; border: 1px solid #E0E0E0; border-radius: 12px;
  padding: 10px 12px; font-size: 14px; color: #222;
  background: #F7F5F0; resize: none; font-family: inherit; outline: none;
}
.memo-input:focus { border-color: #ccc; background: #fff; }
.btn-save {
  width: 100%; margin-top: 12px; padding: 14px;
  background: #E24B4A; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600; color: white; cursor: pointer; font-family: inherit;
}
.btn-cancel {
  width: 100%; margin-top: 8px; padding: 12px;
  background: none; border: 1px solid #E0E0E0; border-radius: 14px;
  font-size: 14px; color: #888; cursor: pointer; font-family: inherit;
}

/* 一覧タブ */
.list-view { padding: 14px 16px 32px; }
.list-title { font-size: 14px; font-weight: 600; color: #888; margin-bottom: 10px; }
.record-list { display: flex; flex-direction: column; gap: 8px; }
.record-item {
  display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px;
  background: #F7F5F0; border-radius: 14px; font-size: 14px;
}
.rec-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
.rec-blood-bg { background: #FCEBEB; }
.rec-pill-bg  { background: #E6F1FB; }
.rec-hosp-bg  { background: #EAF3DE; }
.rec-pause-bg { background: #EEEDFE; font-size: 15px; color: #7F77DD; }
.rec-info { flex: 1; }
.rec-date  { font-size: 12px; color: #aaa; }
.rec-label { font-weight: 600; color: #222; }
.rec-memo  { font-size: 12px; color: #888; margin-top: 2px; }
.rec-del { color: #ccc; cursor: pointer; font-size: 20px; padding: 0 4px; flex-shrink: 0; line-height: 32px; }
.no-records { font-size: 14px; color: #bbb; text-align: center; padding: 32px 0; }
</style>
</head>
<body>

<div class="status-bar">
  <span class="title">からだ記録</span>
  <div style="display:flex;gap:8px">
    <button class="nav-btn" onclick="showView('cal')">カレンダー</button>
    <button class="nav-btn" onclick="showView('list')">一覧</button>
  </div>
</div>

<div id="view-cal">
  <div class="cal-header">
    <div class="month-label" id="month-label"></div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="weekdays">
    <div class="weekday">日</div><div class="weekday">月</div><div class="weekday">火</div>
    <div class="weekday">水</div><div class="weekday">木</div><div class="weekday">金</div>
    <div class="weekday">土</div>
  </div>
  <div class="calendar-grid" id="cal-grid"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(226,75,74,0.2)"></div>出血</div>
    <div class="legend-item">
      <svg width="9" height="9" viewBox="0 0 9 9"><line x1="1" y1="1" x2="8" y2="8" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="1" x2="1" y2="8" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/></svg>
      休薬日
    </div>
    <div class="legend-item">
      <svg width="13" height="9" viewBox="0 0 13 9"><rect x="0.5" y="0.5" width="12" height="8" rx="4" fill="none" stroke="#185FA5" stroke-width="1"/><line x1="6.5" y1="0.5" x2="6.5" y2="8.5" stroke="#185FA5" stroke-width="1"/><circle cx="3.3" cy="4.5" r="1.2" fill="#185FA5" opacity="0.7"/><circle cx="9.7" cy="4.5" r="1.2" fill="#185FA5" opacity="0.3"/></svg>
      痛み止め
    </div>
    <div class="legend-item">
      <svg width="11" height="11" viewBox="0 0 11 11"><rect x="0.5" y="3" width="10" height="7.5" rx="1" fill="none" stroke="#3B6D11" stroke-width="1"/><path d="M3.5 3V2Q3.5 1 5.5 1Q7.5 1 7.5 2V3" fill="none" stroke="#3B6D11" stroke-width="1"/><line x1="3.5" y1="6.5" x2="7.5" y2="6.5" stroke="#3B6D11" stroke-width="1"/><line x1="5.5" y1="4.5" x2="5.5" y2="8.5" stroke="#3B6D11" stroke-width="1"/></svg>
      通院
    </div>
    <div class="legend-item">
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M7 1L9 3L3.5 8.5L1 9L1.5 6.5Z" fill="none" stroke="#888780" stroke-width="1" stroke-linejoin="round"/><line x1="6" y1="2" x2="8" y2="4" stroke="#888780" stroke-width="1"/></svg>
      メモ
    </div>
  </div>
  <div class="memo-section">
    <div class="memo-section-title">メモ一覧</div>
    <div id="memo-list"></div>
  </div>
</div>

<div id="view-list" style="display:none">
  <div class="list-view">
    <div class="list-title">記録一覧</div>
    <div class="record-list" id="record-list"></div>
    <div id="no-records" class="no-records" style="display:none">記録がありません</div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-date-title"></div>
    <div class="btn-group">
      <button class="btn-record" id="btn-blood" onclick="toggleRecord('blood')">
        <svg width="28" height="34" viewBox="0 0 28 34">
          <path d="M14 3C14 3 4 15 4 22A10 10 0 0 0 24 22C24 15 14 3 14 3Z" fill="#E24B4A"/>
          <ellipse cx="10" cy="21" rx="2.5" ry="3.5" fill="rgba(255,255,255,0.35)"/>
        </svg>
        <span class="btn-blood-label">出血</span>
      </button>
      <button class="btn-record" id="btn-pause" onclick="toggleRecord('pause')">
        <svg width="30" height="30" viewBox="0 0 30 30">
          <line x1="5" y1="5" x2="25" y2="25" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
          <line x1="25" y1="5" x2="5" y2="25" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="btn-pause-label">休薬日</span>
      </button>
    </div>
    <div class="btn-group-2">
      <button class="btn-record" id="btn-pill" onclick="toggleRecord('pill')">
        <svg width="44" height="26" viewBox="0 0 44 26">
          <rect x="1.5" y="1.5" width="41" height="23" rx="11.5" fill="none" stroke="#185FA5" stroke-width="2"/>
          <line x1="22" y1="1.5" x2="22" y2="24.5" stroke="#185FA5" stroke-width="2"/>
          <circle cx="11" cy="13" r="4" fill="#185FA5" opacity="0.7"/>
          <circle cx="33" cy="13" r="4" fill="#185FA5" opacity="0.25"/>
        </svg>
        <span class="btn-pill-label">痛み止め</span>
      </button>
      <button class="btn-record" id="btn-hospital" onclick="toggleRecord('hospital')">
        <svg width="34" height="32" viewBox="0 0 34 32">
          <rect x="2" y="10" width="30" height="20" rx="3" fill="none" stroke="#3B6D11" stroke-width="2"/>
          <path d="M11 10V7Q11 3 17 3Q23 3 23 7V10" fill="none" stroke="#3B6D11" stroke-width="2"/>
          <line x1="11" y1="20" x2="23" y2="20" stroke="#3B6D11" stroke-width="2.2"/>
          <line x1="17" y1="14" x2="17" y2="26" stroke="#3B6D11" stroke-width="2.2"/>
        </svg>
        <span class="btn-hospital-label">通院</span>
      </button>
    </div>
    <div class="memo-label">メモ（任意）</div>
    <textarea class="memo-input" id="memo-input" rows="2" placeholder="痛みの強さ、薬の種類、病院名など…"></textarea>
    <button class="btn-save" onclick="saveAndClose()">保存して閉じる</button>
    <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<script>
// ========== データ ==========
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedDate = null;
let tempRecord = {};

// localStorageでデータ永続化
function loadRecords() {
  try { return JSON.parse(localStorage.getItem('karada_records') || '{}'); } catch(e) { return {}; }
}
function saveRecords() {
  localStorage.setItem('karada_records', JSON.stringify(records));
}
const records = loadRecords();

// ========== ユーティリティ ==========
function fmt(y, m, d) {
  const dd = new Date(y, m, d);
  return dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0') + '-' + String(dd.getDate()).padStart(2,'0');
}
function hasMemo(rec) { return !!(rec && rec.memo && rec.memo.trim()); }

// ========== SVGアイコン（小） ==========
function svgPauseSmall() {
  return `<svg width="9" height="9" viewBox="0 0 9 9"><line x1="1" y1="1" x2="8" y2="8" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="1" x2="1" y2="8" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}
function svgPillSmall() {
  return `<svg width="13" height="9" viewBox="0 0 13 9"><rect x="0.5" y="0.5" width="12" height="8" rx="4" fill="none" stroke="#185FA5" stroke-width="1"/><line x1="6.5" y1="0.5" x2="6.5" y2="8.5" stroke="#185FA5" stroke-width="1"/><circle cx="3.3" cy="4.5" r="1.2" fill="#185FA5" opacity="0.7"/><circle cx="9.7" cy="4.5" r="1.2" fill="#185FA5" opacity="0.3"/></svg>`;
}
function svgHospSmall() {
  return `<svg width="11" height="11" viewBox="0 0 11 11"><rect x="0.5" y="3" width="10" height="7.5" rx="1" fill="none" stroke="#3B6D11" stroke-width="1"/><path d="M3.5 3V2Q3.5 1 5.5 1Q7.5 1 7.5 2V3" fill="none" stroke="#3B6D11" stroke-width="1"/><line x1="3.5" y1="6.5" x2="7.5" y2="6.5" stroke="#3B6D11" stroke-width="1"/><line x1="5.5" y1="4.5" x2="5.5" y2="8.5" stroke="#3B6D11" stroke-width="1"/></svg>`;
}
function svgPencilSmall() {
  return `<svg width="10" height="10" viewBox="0 0 10 10"><path d="M7 1L9 3L3.5 8.5L1 9L1.5 6.5Z" fill="none" stroke="#888780" stroke-width="1" stroke-linejoin="round"/><line x1="6" y1="2" x2="8" y2="4" stroke="#888780" stroke-width="1"/></svg>`;
}

// ========== カレンダー ==========
function makeCell(y, m, d, otherMonth) {
  const dateStr = fmt(y, m, d);
  const rec = records[dateStr] || {};
  const dow = new Date(y, m, d).getDay();
  const today = new Date();
  const isToday = y === today.getFullYear() && m === today.getMonth() && d === today.getDate();

  const cell = document.createElement('div');
  let cls = 'day-cell';
  if (otherMonth) cls += ' other-month';
  if (!otherMonth) {
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (isToday)  cls += ' today';
    if (rec.blood) cls += ' has-blood';
  }
  cell.className = cls;

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = d;
  cell.appendChild(num);

  if (!otherMonth && (rec.pause || rec.pill || rec.hospital || hasMemo(rec))) {
    const row = document.createElement('div');
    row.className = 'icon-row';
    if (rec.pause)    { const s = document.createElement('span'); s.innerHTML = svgPauseSmall();  row.appendChild(s); }
    if (rec.pill)     { const s = document.createElement('span'); s.innerHTML = svgPillSmall();   row.appendChild(s); }
    if (rec.hospital) { const s = document.createElement('span'); s.innerHTML = svgHospSmall();   row.appendChild(s); }
    if (hasMemo(rec)) { const s = document.createElement('span'); s.innerHTML = svgPencilSmall(); row.appendChild(s); }
    cell.appendChild(row);
  }

  if (!otherMonth) cell.onclick = () => openModal(y, m, d, dateStr);
  return cell;
}

function renderCal() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-label').textContent = currentYear + '年 ' + months[currentMonth];
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const first = new Date(currentYear, currentMonth, 1).getDay();
  const dim   = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prev  = new Date(currentYear, currentMonth, 0).getDate();
  for (let i = 0; i < first; i++) grid.appendChild(makeCell(currentYear, currentMonth - 1, prev - first + 1 + i, true));
  for (let d = 1; d <= dim; d++) grid.appendChild(makeCell(currentYear, currentMonth, d, false));
  const rem = 42 - first - dim;
  for (let d = 1; d <= rem; d++) grid.appendChild(makeCell(currentYear, currentMonth + 1, d, true));
  renderMemoList();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCal();
}

// ========== メモ一覧 ==========
function renderMemoList() {
  const container = document.getElementById('memo-list');
  const tagMap = { blood:['出血','tag-blood'], pill:['痛み止め','tag-pill'], hospital:['通院','tag-hospital'], pause:['休薬日','tag-pause'] };
  const entries = [];
  Object.keys(records).sort().forEach(dateStr => {
    const rec = records[dateStr];
    if (!rec || !rec.memo || !rec.memo.trim()) return;
    const [y, m, d] = dateStr.split('-').map(Number);
    const dow = ['日','月','火','水','木','金','土'][new Date(y, m-1, d).getDay()];
    const label = m + '月' + d + '日（' + dow + '）';
    const tags = ['blood','pause','pill','hospital'].filter(t => rec[t])
      .map(t => { const [lbl, cls] = tagMap[t]; return `<span class="memo-type-tag ${cls}">${lbl}</span>`; }).join('');
    entries.push({ label, memo: rec.memo, tags });
  });
  if (!entries.length) { container.innerHTML = '<div class="no-memo">メモはまだありません</div>'; return; }
  container.innerHTML = entries.map(e =>
    `<div class="memo-entry">
      <div class="memo-date">${e.label}</div>
      <div class="memo-body">${e.tags}${e.memo}</div>
    </div>`
  ).join('');
}

// ========== モーダル ==========
function applyBtnState(type, isOn) {
  const btn = document.getElementById('btn-' + type);
  const onCls = { blood:'on-blood', pill:'on-pill', hospital:'on-hospital', pause:'on-pause' };
  if (isOn) btn.classList.add(onCls[type]);
  else btn.classList.remove(onCls[type]);
}

function openModal(y, m, d, dateStr) {
  selectedDate = dateStr;
  tempRecord = JSON.parse(JSON.stringify(records[dateStr] || {}));
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('modal-date-title').textContent = (m+1) + '月' + d + '日（' + days[new Date(y,m,d).getDay()] + '）';
  ['blood','pause','pill','hospital'].forEach(t => {
    document.getElementById('btn-' + t).className = 'btn-record';
    applyBtnState(t, !!tempRecord[t]);
  });
  document.getElementById('memo-input').value = tempRecord.memo || '';
  document.getElementById('modal').classList.remove('hidden');
}

function toggleRecord(type) {
  tempRecord[type] = !tempRecord[type];
  applyBtnState(type, !!tempRecord[type]);
}

function saveAndClose() {
  const memo = document.getElementById('memo-input').value.trim();
  const hasAny = tempRecord.blood || tempRecord.pause || tempRecord.pill || tempRecord.hospital;
  if (hasAny || memo) {
    tempRecord.memo = memo;
    records[selectedDate] = tempRecord;
  } else {
    delete records[selectedDate];
  }
  saveRecords();
  document.getElementById('modal').classList.add('hidden');
  renderCal();
  renderList();
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

// モーダル外タップで閉じる
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ========== 一覧 ==========
function renderList() {
  const list  = document.getElementById('record-list');
  const noRec = document.getElementById('no-records');
  const keys  = Object.keys(records).sort().reverse();
  if (!keys.length) { list.innerHTML = ''; noRec.style.display = 'block'; return; }
  noRec.style.display = 'none';
  list.innerHTML = '';
  const types = [
    { key:'blood',    label:'出血',    icon:'🩸', bg:'rec-blood-bg', iconStyle:'' },
    { key:'pause',    label:'休薬日',   icon:'✕',  bg:'rec-pause-bg', iconStyle:'font-size:16px;color:#7F77DD;' },
    { key:'pill',     label:'痛み止め', icon:'💊', bg:'rec-pill-bg',  iconStyle:'' },
    { key:'hospital', label:'通院',    icon:'🏥', bg:'rec-hosp-bg',  iconStyle:'' },
  ];
  keys.forEach(dateStr => {
    const rec = records[dateStr];
    const [y, m, d] = dateStr.split('-').map(Number);
    const dow = ['日','月','火','水','木','金','土'][new Date(y, m-1, d).getDay()];
    const label = m + '月' + d + '日（' + dow + '）';
    types.forEach(({ key, label: lbl, icon, bg, iconStyle }) => {
      if (!rec[key]) return;
      const item = document.createElement('div');
      item.className = 'record-item';
      item.innerHTML = `
        <div class="rec-icon ${bg}" style="${iconStyle}">${icon}</div>
        <div class="rec-info">
          <div class="rec-label">${lbl}</div>
          <div class="rec-date">${label}</div>
          ${rec.memo ? `<div class="rec-memo">${rec.memo}</div>` : ''}
        </div>
        <div class="rec-del" onclick="deleteRecord('${dateStr}','${key}')">×</div>`;
      list.appendChild(item);
    });
  });
}

function deleteRecord(dateStr, type) {
  if (!records[dateStr]) return;
  delete records[dateStr][type];
  if (!records[dateStr].blood && !records[dateStr].pause && !records[dateStr].pill && !records[dateStr].hospital) {
    delete records[dateStr];
  }
  saveRecords();
  renderList();
  renderCal();
}

function showView(v) {
  document.getElementById('view-cal').style.display  = v === 'cal'  ? '' : 'none';
  document.getElementById('view-list').style.display = v === 'list' ? '' : 'none';
  if (v === 'list') renderList();
}

// ========== 起動 ==========
renderCal();
</script>
</body>
